apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: rag-chatbot
  labels:
    app.kubernetes.io/name: rag-chatbot
data:
  MONGO_DB_NAME: "rag_chatbot"
  FRONTEND_PORT: "3000"
  BACKEND_PORT: "5000"
  CHATBOT_PORT: "8000"
  MONGO_PORT: "27017"
  CHATBOT_URL: "http://chatbot:8000"
  FASTAPI_URL: "http://chatbot:8000"
  BACKEND_URL: "http://backend:5000"
  CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
