name: CD - Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/rag-backend
  CHATBOT_IMAGE: ${{ secrets.DOCKER_USERNAME }}/rag-chatbot
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/rag-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from git commit SHA
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push chatbot image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: chatbot/Dockerfile
          push: true
          tags: |
            ${{ env.CHATBOT_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.CHATBOT_IMAGE }}:latest
          cache-from: type=gha,scope=chatbot
          cache-to: type=gha,scope=chatbot,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > kubeconfig.yaml
          echo "KUBECONFIG=$(pwd)/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply configmap
        run: kubectl apply -f k8s/configmap.yaml

      - name: Update backend deployment image
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }} \
            -n rag-chatbot

      - name: Update chatbot deployment image
        run: |
          kubectl set image deployment/chatbot \
            chatbot=${{ env.CHATBOT_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }} \
            -n rag-chatbot

      - name: Update frontend deployment image
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }} \
            -n rag-chatbot

      - name: Apply remaining Kubernetes manifests
        run: |
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/chatbot/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/mongodb/

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/backend -n rag-chatbot --timeout=120s

      - name: Wait for chatbot rollout
        run: kubectl rollout status deployment/chatbot -n rag-chatbot --timeout=120s

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/frontend -n rag-chatbot --timeout=120s

      - name: Automatic rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Initiating automatic rollback..."
          kubectl rollout undo deployment/backend -n rag-chatbot
          kubectl rollout undo deployment/chatbot -n rag-chatbot
          kubectl rollout undo deployment/frontend -n rag-chatbot
          echo "✅ Rollback completed"
